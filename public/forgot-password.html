<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <style>
    @view-transition {
      navigation: auto;
    }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — LensGenz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

  <nav class="site-nav">
    <div class="wrap">
      <a href="/" class="brand">Lens<span>Genz</span></a>
      <div></div>
      <div class="nav-actions"><a href="/login.html" class="btn btn-ghost">Log in</a></div>
    </div>
  </nav>

  <section class="section">
    <div class="wrap" style="max-width:480px">
      <div class="center reveal" style="margin-bottom:28px">
        <p class="eyebrow">Password reset</p>
        <h1>Forgot your password?</h1>
        <p class="muted">Enter the email you signed up with and we'll send you a link to set a new one.</p>
      </div>
      <form class="auth-card reveal" id="forgotForm">
        <div id="formMsg"></div>
        <div class="field"><label>Email</label><input type="email" name="email" required /></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submitBtn">Send
          reset link</button>
        <p class="center hint" style="margin-top:18px">Remembered it? <a href="/login.html"
            style="color:var(--rose-dark);font-weight:600">Log in</a></p>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/js/supabaseClient.js"></script>
  <script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
  <script>
    (function () {
      const form = document.getElementById('forgotForm');
      const msg = document.getElementById('formMsg');
      const btn = document.getElementById('submitBtn');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.innerHTML = '';
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Sending…';

        const email = new FormData(form).get('email');

        try {
          await LG.ready;
          await LG.supabase.auth.resetPasswordForEmail(email, {
            redirectTo: `${window.location.origin}/reset-password.html`,
          });
        } catch (err) {
          // Fall through to the same message below regardless of outcome — avoids
          // revealing whether an email address has an account.
        }

        form.style.display = 'none';
        msg.innerHTML = '<div class="form-success">If an account exists for that email, a reset link is on its way. Check your inbox.</div>';
      });
    })();
  </script>
</body>

</html>
