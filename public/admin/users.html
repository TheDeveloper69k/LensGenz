<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>@view-transition { navigation: auto; }</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    <a href="/" class="brand">Lens<span>Genz</span></a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/explore.html">Explore</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
  </div>
</nav>

<div class="dash-shell">
  <aside class="dash-sidebar">
    <a href="/admin/index.html">📊 Overview</a>
    <a href="/admin/queue.html">🗳️ Review Queue</a>
    <a href="/admin/content.html">🗂️ All Content</a>
    <a href="/admin/users.html" class="active">👥 Users</a>
    <div class="side-title">Public</div>
    <a href="/explore.html">🔎 Explore</a>
    <a href="/">🏡 Home</a>
  </aside>

  <main class="dash-main">
    <div class="dash-header"><div><p class="eyebrow">Admin</p><h1>Users</h1></div></div>
    <div id="usersList"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/api.js"></script>
<script src="/js/cards.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/nav.js"></script>
<script>
(async function () {
  const me = await LG.requireAdmin();
  const listEl = document.getElementById('usersList');
  listEl.innerHTML = '<div class="skeleton" style="height:200px"></div>';

  async function load() {
    try {
      const users = await LG.api('/api/admin/users');
      render(users);
    } catch (err) {
      listEl.innerHTML = `<div class="empty-state">${LG.escapeHtml(err.message)}</div>`;
    }
  }

  function render(users) {
    const rows = users
      .map(
        (u) => `
        <tr>
          <td><strong>${LG.escapeHtml(u.display_name)}</strong></td>
          <td>${LG.escapeHtml(u.email)}</td>
          <td><span class="badge ${u.role === 'admin' ? 'badge-approved' : 'badge-pending'}">${u.role}</span></td>
          <td>${LG.formatDate(u.created_at)}</td>
          <td>
            ${
              u.id === me.id
                ? '<span class="muted">You</span>'
                : `<button class="btn btn-sm btn-outline" data-toggle="${u.id}" data-role="${u.role === 'admin' ? 'user' : 'admin'}">Make ${u.role === 'admin' ? 'User' : 'Admin'}</button>`
            }
          </td>
        </tr>`
      )
      .join('');

    listEl.innerHTML = `<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Joined</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;

    listEl.querySelectorAll('[data-toggle]').forEach((btn) =>
      btn.addEventListener('click', async () => {
        btn.disabled = true;
        try {
          await LG.api(`/api/admin/users/${btn.dataset.toggle}/role`, { method: 'PUT', body: { role: btn.dataset.role } });
          load();
        } catch (err) {
          alert(err.message);
          btn.disabled = false;
        }
      })
    );
  }

  load();
})();
</script>
</body>
</html>
