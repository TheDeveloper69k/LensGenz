<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>@view-transition { navigation: auto; }</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — LensGenz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    <a href="/" class="brand">Lens<span>Genz</span></a>
    <div></div>
    <div class="nav-actions"><a href="/login.html" class="btn btn-ghost">Log in</a></div>
  </div>
</nav>

<section class="section">
  <div class="wrap" style="max-width:480px">
    <div class="center reveal" style="margin-bottom:28px">
      <p class="eyebrow">Password reset</p>
      <h1>Choose a new password</h1>
    </div>
    <div id="resetRoot" class="reveal"></div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
(async function () {
  const root = document.getElementById('resetRoot');
  root.innerHTML = '<div class="skeleton" style="height:220px"></div>';

  await LG.ready;

  if (!LG.session) {
    root.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔒</div>
        <p>This reset link is invalid or has expired.</p>
        <a href="/forgot-password.html" class="btn btn-outline" style="margin-top:14px">Request a new link</a>
      </div>`;
    return;
  }

  root.innerHTML = `
    <form class="auth-card" id="resetForm" style="margin:0">
      <div id="formMsg"></div>
      <div class="field"><label>New password</label><input type="password" name="password" minlength="6" required /><p class="hint">At least 6 characters.</p></div>
      <div class="field"><label>Confirm new password</label><input type="password" name="confirm" minlength="6" required /></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submitBtn">Update password</button>
    </form>`;

  const form = document.getElementById('resetForm');
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.innerHTML = '';

    const fd = new FormData(form);
    const password = fd.get('password');
    const confirm = fd.get('confirm');

    if (password !== confirm) {
      msg.innerHTML = '<div class="form-error">Passwords don\'t match.</div>';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Updating…';

    try {
      const { error } = await LG.supabase.auth.updateUser({ password });
      if (error) throw error;
      await LG.supabase.auth.signOut();
      window.location.href = '/login.html?reset=success';
    } catch (err) {
      msg.innerHTML = `<div class="form-error">${err.message || 'Could not update password.'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Update password';
    }
  });
})();
</script>
</body>
</html>
