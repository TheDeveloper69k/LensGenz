<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>@view-transition { navigation: auto; }</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log In — LensGenz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    <a href="/" class="brand">Lens<span>Genz</span></a>
    <div></div>
    <div class="nav-actions"><a href="/signup.html" class="btn btn-primary">Get Started</a></div>
  </div>
</nav>

<section class="section">
  <div class="wrap" style="max-width:480px">
    <div class="center reveal" style="margin-bottom:28px">
      <p class="eyebrow">Welcome back</p>
      <h1>Log in to LensGenz</h1>
    </div>
    <form class="auth-card reveal" id="loginForm">
      <div id="formMsg"></div>
      <div class="field"><label>Email</label><input type="email" name="email" required /></div>
      <div class="field">
        <label style="display:flex;justify-content:space-between;align-items:baseline">
          <span>Password</span>
          <a href="/forgot-password.html" style="font-size:0.82rem;font-weight:500;color:var(--rose-dark)">Forgot password?</a>
        </label>
        <input type="password" name="password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="submitBtn">Log in</button>
      <p class="center hint" style="margin-top:18px">New here? <a href="/signup.html" style="color:var(--rose-dark);font-weight:600">Create an account</a></p>
    </form>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
(function () {
  const form = document.getElementById('loginForm');
  const msg = document.getElementById('formMsg');
  const btn = document.getElementById('submitBtn');

  if (new URLSearchParams(window.location.search).get('reset') === 'success') {
    msg.innerHTML = '<div class="form-success">Your password has been updated — log in with your new password.</div>';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.innerHTML = '';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Logging in…';

    const fd = new FormData(form);
    try {
      await LG.ready;
      const { error } = await LG.supabase.auth.signInWithPassword({ email: fd.get('email'), password: fd.get('password') });
      if (error) throw error;
      await LG.api('/api/profile/sync', { method: 'POST', body: {} });
      window.location.href = '/dashboard.html';
    } catch (err) {
      msg.innerHTML = `<div class="form-error">${err.message || 'Could not log in.'}</div>`;
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });
})();
</script>
</body>
</html>
