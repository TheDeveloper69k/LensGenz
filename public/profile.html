<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>@view-transition { navigation: auto; }</style>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Profile — LensGenz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
<link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>

<nav class="site-nav">
  <div class="wrap">
    <a href="/" class="brand">Lens<span>Genz</span></a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">Home</a></li>
      <li><a href="/explore.html">Explore</a></li>
      <li><a href="/about.html">About</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
  </div>
</nav>

<div class="dash-shell">
  <aside class="dash-sidebar">
    <a href="/dashboard.html">🏠 Overview</a>
    <a href="/submit.html">➕ Submit New</a>
    <a href="/profile.html" class="active">👤 Profile</a>
    <div class="side-title">Public</div>
    <a href="/explore.html">🔎 Explore</a>
    <a href="/">🏡 Home</a>
  </aside>

  <main class="dash-main" style="max-width:560px">
    <div class="dash-header"><div><p class="eyebrow">Account</p><h1>Your Profile</h1></div></div>
    <div id="formMsg"></div>
    <form id="profileForm" class="auth-card" style="margin:0">
      <div class="field"><label>Display name</label><input type="text" name="displayName" required /></div>
      <div class="field"><label>Email</label><input type="email" id="emailField" disabled /></div>
      <div class="field"><label>Role</label><input type="text" id="roleField" disabled /></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Save Changes</button>
    </form>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/js/supabaseClient.js"></script>
<script src="/js/api.js"></script>
<script src="/js/guard.js"></script>
<script src="/js/nav.js"></script>
<script>
(async function () {
  const profile = await LG.requireAuth();
  const form = document.getElementById('profileForm');
  form.displayName.value = profile.display_name;
  document.getElementById('emailField').value = profile.email;
  document.getElementById('roleField').value = profile.role;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('formMsg');
    msg.innerHTML = '';
    try {
      await LG.api('/api/profile/me', { method: 'PUT', body: { displayName: form.displayName.value } });
      msg.innerHTML = '<div class="form-success">Profile updated.</div>';
    } catch (err) {
      msg.innerHTML = `<div class="form-error">${err.message}</div>`;
    }
  });
})();
</script>
</body>
</html>
